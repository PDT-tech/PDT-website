# ============================================================
# PDT SINGERS — Netlify Configuration
# ============================================================

# ── Build settings ──────────────────────────────────────────
[build]
  publish = "."          # serve from repo root (static site, no build step)

# ── Edge functions ───────────────────────────────────────────
# drive-music-download is declared first: it is a terminal handler for
# /api/music-download requests, so inject-env never runs on that path.
[[edge_functions]]
  path = "/api/music-download"
  function = "drive-music-download"

[[edge_functions]]
  path = "/*"
  function = "inject-env"

# ── Security headers ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "no-transform"

# ── Redirects ───────────────────────────────────────────────
# Force HTTPS (Netlify handles SSL but this ensures redirect)
[[redirects]]
  from = "http://pdtsingers.org/*"
  to   = "https://pdtsingers.org/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.pdtsingers.org/*"
  to   = "https://pdtsingers.org/:splat"
  status = 301
  force  = true

# Redirect www to apex
[[redirects]]
  from = "https://www.pdtsingers.org/*"
  to   = "https://pdtsingers.org/:splat"
  status = 301
  force  = true

